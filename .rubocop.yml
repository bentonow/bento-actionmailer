AllCops:
  TargetRubyVersion: 2.6
  NewCops: disable

Naming/FileName:
  Exclude:
    - "lib/bento-actionmailer.rb"

Style/StringLiterals:
  Enabled: true
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  Enabled: true
  EnforcedStyle: double_quotes

Layout/LineLength:
  Max: 120
